<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Дневник Активов | Asset Diary</title>
    <style>
        :root {
            --bg-deep: #06080c;
            --glass-bg: rgba(18, 22, 30, 0.45);
            --glass-border: rgba(255, 255, 255, 0.05);
            --accent: #c9a050;
            --accent-glow: rgba(201, 160, 80, 0.5);
            --accent-soft: rgba(201, 160, 80, 0.12);
            --text-primary: #e8ecf2;
            --text-secondary: #8899b4;
            --text-muted: #556078;
            --radius-md: 16px;
            --radius-lg: 22px;
            --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.4), 0 8px 32px rgba(0, 0, 0, 0.3);
            --font-primary: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            --danger: #e63946;
            --success: #2ecc71;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-primary);
            background: var(--bg-deep);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 8px;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .app-container {
            max-width: 430px;
            width: 100%;
            height: 820px;
            background:
                linear-gradient(135deg, rgba(10, 14, 20, 0.75), rgba(6, 8, 12, 0.82)),
                url('bg.jpg') center/cover no-repeat;
            border-radius: 38px;
            box-shadow: 0 35px 60px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.07);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .bg-orbs {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
            border-radius: 38px;
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.12;
            animation: orbFloat 20s ease-in-out infinite;
        }

        .bg-orb:nth-child(1) {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(201, 160, 80, 0.4), transparent 70%);
            top: -8%;
            left: -12%;
        }

        .bg-orb:nth-child(2) {
            width: 160px;
            height: 160px;
            background: radial-gradient(circle, rgba(120, 140, 200, 0.3), transparent 70%);
            bottom: -5%;
            right: -8%;
            animation-delay: -8s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(25px, -30px) scale(1.1); }
        }

        .header {
            padding: 16px 18px 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 2;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            background: url('logo.png') center/cover no-repeat;
            width: 40px;
            height: 40px;
            border-radius: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 8px 20px rgba(201, 160, 80, 0.35);
            animation: logoFloat 3s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        .brand-text {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: -0.3px;
            background: linear-gradient(to right, #e8ecf2, #bcc8d8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .admin-gear-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-muted);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            position: relative;
            z-index: 3;
        }

        .admin-gear-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-secondary);
        }

        .admin-gear-btn.spinning {
            animation: gearSpin 0.6s ease;
        }

        .admin-gear-btn.active {
            background: rgba(201, 160, 80, 0.2);
            border-color: rgba(201, 160, 80, 0.4);
            color: var(--accent);
        }

        @keyframes gearSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(180deg); }
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 8px 14px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
            z-index: 2;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.06) transparent;
        }

        .main-content::-webkit-scrollbar { width: 3px; }
        .main-content::-webkit-scrollbar-track { background: transparent; }
        .main-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 3px; }

        .admin-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(18, 22, 30, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(201, 160, 80, 0.2);
            border-radius: 14px;
            padding: 10px 14px;
            margin-bottom: 2px;
            font-size: 0.75rem;
            color: var(--accent);
            font-weight: 500;
        }

        .admin-bar-actions {
            display: flex;
            gap: 8px;
        }

        .btn-admin {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-primary);
            transition: all 0.2s ease;
            font-family: var(--font-primary);
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .btn-admin:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-admin.primary {
            background: rgba(201, 160, 80, 0.2);
            border-color: rgba(201, 160, 80, 0.4);
            color: var(--accent);
        }

        .btn-admin.primary:hover {
            background: rgba(201, 160, 80, 0.3);
        }

        .edit-icon-btn {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .edit-icon-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .edit-icon-btn.edit:hover {
            background: rgba(201, 160, 80, 0.2);
            border-color: rgba(201, 160, 80, 0.4);
            color: var(--accent);
        }

        .edit-icon-btn.delete:hover {
            background: rgba(230, 57, 70, 0.2);
            border-color: rgba(230, 57, 70, 0.4);
            color: #ff6b6b;
        }

        .edit-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .edit-modal {
            background: rgba(20, 24, 34, 0.98);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 24px;
            width: 90%;
            max-width: 360px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .edit-modal h3 {
            color: var(--text-primary);
            font-size: 1rem;
            margin-bottom: 18px;
            font-weight: 600;
        }

        .edit-modal .field {
            margin-bottom: 14px;
        }

        .edit-modal .field label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.72rem;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .edit-modal .field input {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.85rem;
            outline: none;
            font-family: var(--font-primary);
            transition: border-color 0.2s;
        }

        .edit-modal .field input:focus {
            border-color: var(--accent);
        }

        .image-upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.02);
        }

        .image-upload-area:hover {
            border-color: rgba(201, 160, 80, 0.5);
            background: rgba(201, 160, 80, 0.05);
        }

        .image-upload-area img {
            max-width: 80px;
            max-height: 80px;
            border-radius: 10px;
            margin-bottom: 8px;
        }

        .image-upload-area span {
            display: block;
            color: var(--text-secondary);
            font-size: 0.75rem;
        }

        .edit-modal .actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .btn-modal {
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-family: var(--font-primary);
            transition: all 0.2s ease;
        }

        .btn-modal.save {
            background: var(--accent);
            color: #000;
        }

        .btn-modal.save:hover {
            opacity: 0.9;
        }

        .btn-modal.cancel {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-secondary);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-card {
            background: rgba(18, 22, 30, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-lg);
            padding: 18px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.6s ease both;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08) 50%, transparent);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stagger-1 { animation-delay: 0.05s; }
        .stagger-2 { animation-delay: 0.1s; }
        .stagger-3 { animation-delay: 0.15s; }
        .stagger-4 { animation-delay: 0.2s; }
        .stagger-5 { animation-delay: 0.25s; }
        .stagger-6 { animation-delay: 0.3s; }
        .stagger-7 { animation-delay: 0.35s; }

        .video-preview {
            background: rgba(18, 22, 30, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: var(--radius-lg);
            overflow: hidden;
            animation: fadeInUp 0.6s ease both;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            width: 100%;
        }

        .video-preview:hover { border-color: rgba(255,0,0,0.5); box-shadow: 0 0 25px rgba(255,0,0,0.3); }
        .video-preview:active { transform: scale(0.97); transition: all 0.1s ease; }

        .video-preview-thumb {
            width: 100%;
            height: 200px;
            background: url('preview.jpg') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .video-preview-thumb::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.25);
        }

        .play-button-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60px; height: 60px;
            background: rgba(255,0,0,0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(255,0,0,0.6);
            transition: all 0.3s ease;
            z-index: 2;
        }

        .play-button-overlay::after {
            content: '';
            width: 0; height: 0;
            border-left: 20px solid white;
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            margin-left: 4px;
        }

        .video-preview:hover .play-button-overlay {
            transform: translate(-50%,-50%) scale(1.1);
            box-shadow: 0 0 50px rgba(255,0,0,0.9);
        }

        .video-preview-info { padding: 14px; }
        .video-preview-title { color: var(--text-primary); font-weight: 600; font-size: 0.9rem; margin-bottom: 4px; }
        .video-preview-channel { color: var(--text-secondary); font-size: 0.75rem; }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 4px;
            width: 100%;
        }

        .grid-nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 2px 0;
            width: 100%;
            padding: 0;
            align-items: center;
        }

        .nav-card {
            background: linear-gradient(180deg, 
                rgba(35,30,22,0.5) 0%, 
                rgba(22,18,10,0.55) 30%,
                rgba(30,24,13,0.5) 60%,
                rgba(18,14,7,0.6) 100%);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 35px;
            padding: 10px 50px 10px 16px;
            text-align: center;
            color: #d4b860;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            max-width: 240px;
            position: relative;
            transition: all 0.35s ease;
            animation: fadeInUp 0.6s ease both;
            border: 1px solid rgba(201,160,80,0.3);
            box-shadow: 0 0 10px rgba(201,160,80,0.15), inset 0 1px 0 rgba(255,255,255,0.06), 0 3px 8px rgba(0,0,0,0.4);
            overflow: visible;
        }

        .nav-card::before {
            content: '';
            position: absolute;
            top: 2px; left: 12px; right: 12px;
            height: 30%;
            background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.04) 40%, rgba(255,255,255,0) 100%);
            border-radius: 35px 35px 50% 50%;
            pointer-events: none;
            z-index: 0;
        }

        .nav-card span {
            font-size: 1.2rem;
            filter: drop-shadow(0 0 5px rgba(201,160,80,0.3));
            transition: transform 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .nav-card .nav-text {
            position: relative;
            z-index: 1;
        }

        .nav-card .nav-text-sm {
            font-size: 0.55rem;
            position: relative;
            z-index: 1;
        }

        .nav-card:hover { 
            transform: translateY(-2px); 
            border-color: rgba(201,160,80,0.5); 
            box-shadow: 0 0 18px rgba(201,160,80,0.25), inset 0 1px 0 rgba(255,255,255,0.06), 0 5px 12px rgba(0,0,0,0.5);
        }
        .nav-card:active { 
            transform: scale(0.95); 
            border-color: rgba(201,160,80,0.7); 
            transition: all 0.1s ease;
        }

        .edit-buttons-group {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 3px;
            z-index: 2;
            background: rgba(18, 14, 7, 0.8);
            border-radius: 10px;
            padding: 3px;
            backdrop-filter: blur(5px);
        }

        .btn-back {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 30px;
            padding: 10px 18px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
            margin-bottom: 4px;
            align-self: flex-start;
        }

        .btn-back:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }

        .news-item {
            background: rgba(18,22,30,0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            padding: 14px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 10px;
            animation: fadeInUp 0.6s ease both;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: visible;
        }

        .news-item::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06) 50%, transparent);
        }

        .news-item:hover { border-color: rgba(201,160,80,0.4); box-shadow: 0 0 20px rgba(201,160,80,0.2); }
        .news-item:active { transform: scale(0.98); transition: all 0.1s ease; }

        .exchange-logo-img {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .wallet-logo-img {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            cursor: pointer;
            border: none;
            outline: none;
            position: relative;
            overflow: hidden;
            font-family: var(--font-primary);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            transition: all 0.25s ease;
        }

        .btn-neon {
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.7rem;
            background: rgba(201,160,80,0.1);
            color: #d4a840;
            border: 1px solid rgba(201,160,80,0.35);
            box-shadow: 0 0 10px rgba(201,160,80,0.15);
            flex-shrink: 0;
            margin-top: 8px;
            display: inline-flex;
            width: auto;
        }

        .btn-neon:active { 
            background: rgba(201,160,80,0.2); 
            border-color: #d4a840; 
            transform: scale(0.94); 
        }

        .btn-glow {
            padding: 13px 28px;
            border-radius: 50px;
            font-size: 0.85rem;
            background: radial-gradient(circle at 30% 30%, #d4a840, #8b6914);
            color: #0a0c10;
            box-shadow: 0 0 25px rgba(201,160,80,0.5), 0 0 60px rgba(201,160,80,0.2), inset 0 1px 0 rgba(255,255,255,0.2);
        }

        .btn-wave {
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 0.85rem;
            background: linear-gradient(180deg, rgba(26,36,50,0.7) 0%, rgba(13,20,32,0.7) 100%);
            color: #e0e8f0;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }

        .btn-sm { padding: 8px 16px; font-size: 0.7rem; border-radius: 40px; }
        .btn-full { width: 100%; justify-content: center; }

        .btn .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: scale(0);
            animation: rippleEffect 0.6s ease-out forwards;
            pointer-events: none;
        }

        @keyframes rippleEffect { to { transform: scale(5); opacity: 0; } }

        .poll-bar {
            background: rgba(255,255,255,0.06);
            height: 5px;
            border-radius: 5px;
            margin: 7px 0;
            overflow: hidden;
        }

        .poll-fill {
            height: 5px;
            background: linear-gradient(90deg, #c9a050, #d4b860);
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(201,160,80,0.5);
        }

        .disclaimer-text {
            text-align: center;
            font-size: 0.68rem;
            font-weight: 300;
            letter-spacing: 0.03em;
            line-height: 1.5;
            color: rgba(136, 153, 180, 0.65);
            padding: 16px 14px 6px;
            margin-top: 6px;
            font-style: italic;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            animation: fadeInUp 0.6s ease both;
            animation-delay: 0.4s;
        }

        .disclaimer-text strong {
            font-weight: 500;
            color: rgba(201, 160, 80, 0.55);
            font-style: normal;
        }

        .loading-screen {
            position: absolute;
            inset: 0;
            background: var(--bg-deep);
            z-index: 99;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 38px;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loading-screen.hidden { 
            opacity: 0; 
            visibility: hidden; 
            pointer-events: none; 
        }

        .loader-ring {
            width: 36px; height: 36px;
            border-radius: 50%;

            setTimeout(hideLoadingScreen, 1500);

            document.addEventListener('click', function(e) {
                const btn = e.target.closest('.btn');
                if (!btn) return;
                
                const ripple = document.createElement('span');
                ripple.classList.add('ripple');
                const rect = btn.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
                ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
                btn.appendChild(ripple);
                
                ripple.addEventListener('animationend', () => {
                    if (ripple.parentNode) ripple.remove();
                });
            });

            function openImagePicker(callback) {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.style.display = 'none';
                document.body.appendChild(input);
                
                input.addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = function(event) {
                            callback(event.target.result, file.name);
                        };
                        reader.readAsDataURL(file);
                    }
                    document.body.removeChild(input);
                });
                
                input.click();
            }

            function showEditModal(title, fields, onSave) {
                if (currentEditModal) {
                    document.body.removeChild(currentEditModal);

                const overlay = document.createElement('div');
                overlay.className = 'edit-modal-overlay';
                
                let tempImageDataUrl = null;
                
                let fieldsHTML = '';
                fields.forEach(field => {
                    if (field.type === 'image') {
                        const imageValue = field.value || '';

                                </div>

                        </div>

                document.body.appendChild(overlay);
                currentEditModal = overlay;
                
                const imagePicker = overlay.querySelector('#modal_image_picker');

                    imagePicker.addEventListener('click', function() {
                        openImagePicker(function(dataUrl, fileName) {
                            tempImageDataUrl = dataUrl;

                            if (existingImg) {
                                existingImg.src = dataUrl;
                            } else {
                                const span = imagePicker.querySelector('span');
                                const newImg = document.createElement('img');
                                newImg.src = dataUrl;
                                newImg.alt = 'Preview';
                                newImg.style.cssText = 'max-width:80px; max-height:80px; border-radius:10px; margin-bottom:8px;';

                            }

                            hiddenInput.value = dataUrl;
                        });

                overlay.querySelector('#modalCancel').addEventListener('click', closeEditModal);

                showEditModal('Новая биржа', [
                    { id: 'name', label: 'Название', placeholder: 'Binance' },
                    { id: 'description', label: 'Описание', placeholder: 'Бонус' },
                    { id: 'url', label: 'Ссылка', placeholder: 'https://...' },
                    { id: 'image', label: 'Логотип', type: 'image' }
                ], (values) => {
                    if (!values.name || !values.url) return;
                    state.exchangeItems.push({
                        name: values.name,
                        description: values.description,
                        url: values.url,
                        image: values.image || 'default.png'
                    });
                    navigate('links');
                });
            }

            function editExchangeItem(index) {
                const item = state.exchangeItems[index];
                showEditModal('Редактировать биржу', [
                    { id: 'name', label: 'Название', value: item.name },
                    { id: 'description', label: 'Описание', value: item.description },
                    { id: 'url', label: 'Ссылка', value: item.url },
                    { id: 'image', label: 'Логотип', type: 'image', value: item.image }
                ], (values) => {
                    state.exchangeItems[index] = {
                        name: values.name,
                        description: values.description,
                        url: values.url,
                        image: values.image || item.image
                    };
                    navigate('links');
                });
            }

            function deleteExchangeItem(index) {
                if (confirm('Удалить эту биржу?')) {
                    state.exchangeItems.splice(index, 1);
                    navigate('links');
                }
            }

            function addWalletItem() {
                showEditModal('Новый кошелёк', [
                    { id: 'name', label: 'Название', placeholder: 'SafePal' },
                    { id: 'description', label: 'Описание', placeholder: 'Аппаратный кошелёк' },
                    { id: 'url', label: 'Ссылка', placeholder: 'https://...' },
                    { id: 'image', label: 'Логотип', type: 'image' }
                ], (values) => {
                    if (!values.name || !values.url) return;
                    state.walletItems.push({
                        name: values.name,
                        description: values.description,
                        url: values.url,
                        image: values.image || 'default.png'
                    });
                    navigate('wallets');
                });
            }

            function editWalletItem(index) {
                const item = state.walletItems[index];
                showEditModal('Редактировать кошелёк', [
                    { id: 'name', label: 'Название', value: item.name },
                    { id: 'description', label: 'Описание', value: item.description },
                    { id: 'url', label: 'Ссылка', value: item.url },
                    { id: 'image', label: 'Логотип', type: 'image', value: item.image }
                ], (values) => {
                    state.walletItems[index] = {
                        name: values.name,
                        description: values.description,
                        url: values.url,
                        image: values.image || item.image
                    };
                    navigate('wallets');
                });
            }

            function deleteWalletItem(index) {
                if (confirm('Удалить этот кошелёк?')) {
                    state.walletItems.splice(index, 1);
                    navigate('wallets');
                }
            }

            function editPortfolio() {
                showEditModal('Редактировать портфель', [
                    { id: 'composition', label: 'Состав', value: state.portfolio.composition },
                    { id: 'performance', label: 'Доходность', value: state.portfolio.performance }
                ], (values) => {
                    state.portfolio.composition = values.composition;
                    state.portfolio.performance = values.performance;
                    navigate('portfolio');
                });
            }

            const renderers = {
                home: renderHome, 
                education: renderEducation,
                links: renderLinks, 
                wallets: renderWallets,
                portfolio: renderPortfolio, 
                profile: renderProfile
            };

            let isNavigating = false;

            function navigate(section) {
                if (isNavigating) return;
                isNavigating = true;
                state.section = section;
                
                try {
                    const content = renderers[section]?.() || '';
                    if (mainContent) {
                        mainContent.innerHTML = content;
                        mainContent.scrollTop = 0;
                    }
                } catch(e) {
                    if (mainContent && section !== 'home') {
                        try { mainContent.innerHTML = renderers.home(); } catch(e2) {}
                    }
                }
                
                if (tg?.HapticFeedback) {
                    try { tg.HapticFeedback.impactOccurred('light'); } catch(e) {}
                }
                
                setTimeout(() => { isNavigating = false; }, 100);
            }

            if (mainContent) {
                mainContent.addEventListener('click', function(e) {
                    const navCard = e.target.closest('.nav-card');
                    if (navCard && navCard.dataset.nav) {
                        e.preventDefault();
                        navigate(navCard.dataset.nav);
                        return;
                    }
                    
                    const backBtn = e.target.closest('.btn-back');
                    if (backBtn) {
                        e.preventDefault();
                        navigate('home');
                    }
                });
            }

            window.editVideoPreview = editVideoPreview;
            window.addNavItem = addNavItem;
            window.editNavItem = editNavItem;
            window.deleteNavItem = deleteNavItem;
            window.addEducationItem = addEducationItem;
            window.editEducationItem = editEducationItem;
            window.deleteEducationItem = deleteEducationItem;
            window.addExchangeItem = addExchangeItem;
            window.editExchangeItem = editExchangeItem;
            window.deleteExchangeItem = deleteExchangeItem;
            window.addWalletItem = addWalletItem;
            window.editWalletItem = editWalletItem;
            window.deleteWalletItem = deleteWalletItem;
            window.editPortfolio = editPortfolio;
            window.navigate = navigate;

            navigate('home');
        })();
    </script>
</body>
</html>
