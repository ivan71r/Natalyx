<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Дневник активов | Asset Diary Premium</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: #06080c;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 12px;
      margin: 0;
    }

    /* Premium app shell */
    .app-container {
      max-width: 430px;
      width: 100%;
      height: 820px;
      /* ============================================
         ЗАМІНІТЬ ШЛЯХ НА ВАШЕ ФОТО ТУТ:
         ============================================ */
      background: 
        linear-gradient(135deg, rgba(10, 14, 20, 0.85), rgba(6, 8, 12, 0.92)),
        url('your-photo.jpg') center/cover no-repeat;
      /* Якщо фото в тій самій папці: url('photo.jpg') */
      /* Якщо фото в папці images: url('images/photo.jpg') */
      /* Якщо фото з інтернету: url('https://example.com/photo.jpg') */
      
      border-radius: 38px;
      box-shadow: 0 35px 60px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.07);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      backdrop-filter: blur(20px);
    }

    /* Додатковий варіант: фон для всього body */
    /* Розкоментуйте цей блок, якщо хочете фото на весь екран */
    /*
    body {
      background: 
        linear-gradient(135deg, rgba(6, 8, 12, 0.7), rgba(2, 4, 8, 0.85)),
        url('your-photo.jpg') center/cover no-repeat fixed;
    }
    */

    /* Glassmorphism base */
    .glass-card {
      background: rgba(20, 25, 33, 0.6);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 24px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    }

    .glass-light {
      background: rgba(30, 36, 46, 0.5);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 20px;
    }

    .header {
      padding: 16px 20px 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      background: linear-gradient(135deg, #f0b73e, #d4912a);
      width: 40px;
      height: 40px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 10px 18px rgba(240, 183, 62, 0.3);
    }

    .brand-text {
      font-weight: 700;
      font-size: 1.3rem;
      letter-spacing: -0.3px;
      background: linear-gradient(to right, #f0f4ff, #cbd5e6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .pro-badge {
      background: rgba(240, 183, 62, 0.15);
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #f0b73e;
      letter-spacing: 0.5px;
      border: 1px solid rgba(240, 183, 62, 0.35);
    }

    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 10px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scrollbar-width: thin;
      scrollbar-color: #2a3340 #0f1319;
    }

    .main-content::-webkit-scrollbar {
      width: 4px;
    }
    .main-content::-webkit-scrollbar-track {
      background: #0f1319;
      border-radius: 8px;
    }
    .main-content::-webkit-scrollbar-thumb {
      background: #2a3340;
      border-radius: 8px;
    }

    /* Typography */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #eef3ff;
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 6px;
    }

    .welcome-banner {
      background: linear-gradient(105deg, rgba(22, 30, 40, 0.85), rgba(12, 18, 26, 0.9));
      border-radius: 26px;
      padding: 18px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
    }

    .creator-name {
      font-size: 1.6rem;
      font-weight: 700;
      color: white;
    }

    .accent {
      color: #f0b73e;
    }

    .chips {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .chip {
      background: rgba(255, 255, 255, 0.06);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      color: #cfddee;
      backdrop-filter: blur(5px);
    }

    .grid-nav {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 6px 0;
    }

    .nav-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      border-radius: 18px;
      padding: 14px 4px;
      text-align: center;
      color: #bccfe0;
      font-size: 0.7rem;
      font-weight: 500;
      border: 1px solid rgba(255,255,255,0.03);
      transition: 0.2s;
      cursor: pointer;
    }
    .nav-card span {
      display: block;
      font-size: 1.5rem;
      margin-bottom: 4px;
    }

    .video-item, .news-item, .post-item {
      background: rgba(18, 24, 32, 0.7);
      backdrop-filter: blur(14px);
      border-radius: 22px;
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      margin-bottom: 12px;
    }

    .video-thumb {
      background: linear-gradient(135deg, #243040, #151e28);
      height: 90px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
      font-size: 2rem;
    }

    .btn-gold {
      background: #f0b73e;
      border: none;
      color: #0a0c10;
      font-weight: 700;
      padding: 8px 18px;
      border-radius: 30px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.2s;
    }

    .bottom-nav {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 10px 12px 18px;
      background: rgba(8, 12, 16, 0.85);
      backdrop-filter: blur(30px);
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 30px 30px 0 0;
    }

    .nav-icon {
      color: #6a7a8e;
      font-size: 1.3rem;
      text-align: center;
      transition: 0.2s;
      cursor: pointer;
    }
    .nav-icon.active {
      color: #f0b73e;
      text-shadow: 0 0 10px rgba(240,183,62,0.6);
    }

    .poll-bar {
      background: rgba(255,255,255,0.06);
      height: 6px;
      border-radius: 6px;
      margin: 8px 0;
      overflow: hidden;
    }
    .poll-fill {
      height: 6px;
      background: #f0b73e;
      border-radius: 6px;
    }

    .badge-notif {
      background: #e63946;
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 0.7rem;
      margin-left: 6px;
      color: white;
    }
  </style>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="app-container" id="app">
    <div class="header">
      <div class="logo-area">
        <div class="logo-icon">📈</div>
        <span class="brand-text">Дневник активов</span>
      </div>
      <div class="pro-badge">PREMIUM</div>
    </div>

    <div class="main-content" id="mainContent"></div>

    <div class="bottom-nav">
      <div class="nav-icon active" data-section="home">🏠</div>
      <div class="nav-icon" data-section="videos">🎬</div>
      <div class="nav-icon" data-section="news">📰</div>
      <div class="nav-icon" data-section="community">💬</div>
      <div class="nav-icon" data-section="profile">👤</div>
    </div>
  </div>

  <script>
    (function() {
      const tg = window.Telegram?.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        tg.setHeaderColor('secondary_bg_color');
        tg.setBackgroundColor('#06080c');
      }

      const state = {
        section: 'home',
        bookmarks: new Set(),
        notifications: 3
      };

      // Extended content database
      const data = {
        videos: [
          { title: "Биткоин после халвинга", desc: "Полный разбор рыночного цикла", thumb: "🎥" },
          { title: "DeFi стратегии 2026", desc: "Пассивный доход в крипте", thumb: "📊" },
          { title: "Альткоины: топ-5", desc: "Перспективные монеты", thumb: "🔮" }
        ],
        news: [
          { title: "ETF приток $2.1B", badge: "Срочно", text: "Институционалы заходят в рынок." },
          { title: "Регуляция США", text: "Новый законопроект о стейблкоинах." }
        ],
        polls: [
          { question: "Курс BTC к декабрю?", options: ["$130k+", "$100-130k", "Ниже $100k"], votes: [58, 27, 15] }
        ],
        education: [
          { title: "Блокчейн для начинающих", level: "Базовый" },
          { title: "Продвинутый трейдинг", level: "Профи" },
          { title: "Инвестиционные гиды", level: "Средний" }
        ]
      };

      function renderHome() {
        return `
          <div class="welcome-banner">
            <div style="display:flex; justify-content:space-between;">
              <div>
                <div class="creator-name">Алекс <span class="accent">Крипто</span></div>
                <div style="color:#a0b3cc; font-size:0.8rem;">Дневник активов | Premium</div>
              </div>
              <div style="background:#f0b73e20; border-radius:20px; padding:6px 14px; color:#f0b73e;">⭐ 4.9</div>
            </div>
            <div class="chips">
              <span class="chip">🔔 Новое видео</span>
              <span class="chip">📊 Портфель +5.1%</span>
              <span class="chip">💎 Premium открыт</span>
            </div>
          </div>
          
          <div class="section-header">⚡ Быстрый доступ</div>
          <div class="grid-nav">
            <div class="nav-card" data-nav="videos"><span>🎬</span>Видео</div>
            <div class="nav-card" data-nav="news"><span>📰</span>Новости</div>
            <div class="nav-card" data-nav="community"><span>💬</span>Посты</div>
            <div class="nav-card" data-nav="polls"><span>📊</span>Опросы</div>
            <div class="nav-card" data-nav="education"><span>📚</span>Обучение</div>
            <div class="nav-card" data-nav="links"><span>🔗</span>Ссылки</div>
            <div class="nav-card" data-nav="portfolio"><span>💼</span>Портфель</div>
            <div class="nav-card" data-nav="faq"><span>❓</span>FAQ</div>
          </div>

          <div class="section-header">📢 Объявления <span class="badge-notif">2</span></div>
          <div class="news-item">
            <strong style="color:white;">Premium членство открыто</strong>
            <p style="color:#b0c0d0; font-size:0.8rem;">Ранний доступ к альфа-отчётам.</p>
          </div>
        `;
      }

      function renderVideos() {
        return `
          <div class="section-header">🎬 Последние видео <span style="font-size:0.7rem;">🔍 Поиск</span></div>
          ${data.videos.map(v => `
            <div class="video-item">
              <div class="video-thumb">${v.thumb}</div>
              <strong style="color:white;">${v.title}</strong>
              <div style="color:#9aaec9; font-size:0.8rem;">${v.desc}</div>
              <button class="btn-gold watch-btn">▶ Смотреть</button>
            </div>
          `).join('')}
        `;
      }

      function renderNews() {
        return `
          <div class="section-header">📰 Новости и рынок</div>
          ${data.news.map(n => `
            <div class="news-item">
              <div style="display:flex; justify-content:space-between;">
                <strong style="color:white;">${n.title}</strong>
                ${n.badge ? '<span class="badge-notif">${n.badge}</span>' : ''}
              </div>
              <div style="color:#b0c0d0; font-size:0.8rem;">${n.text}</div>
            </div>
          `).join('')}
        `;
      }

      function renderCommunity() {
        return `
          <div class="section-header">💬 Сообщество</div>
          <div class="post-item">
            <div style="color:white; font-weight:600;">Мнение: Альтсезон близко?</div>
            <div style="color:#95a9c2;">Анализ пары ETH/BTC...</div>
            <div style="display:flex; gap:16px; margin-top:10px; color:#f0b73e;">👍 34 💬 12 🔖</div>
          </div>
          <div class="post-item">
            <div style="color:white; font-weight:600;">Обучение: Что такое TVL?</div>
            <div style="color:#95a9c2;">Total Value Locked объяснение.</div>
            <div style="display:flex; gap:16px; margin-top:10px; color:#f0b73e;">👍 52 💬 8</div>
          </div>
        `;
      }

      function renderPolls() {
        return `
          <div class="section-header">📊 Опросы и голосования</div>
          ${data.polls.map(p => `
            <div class="glass-card" style="padding:16px; margin-bottom:14px;">
              <div style="color:white; font-weight:600;">${p.question}</div>
              ${p.options.map((opt, i) => `
                <div style="margin-top:10px;">
                  <div style="display:flex; justify-content:space-between; color:#cfddee; font-size:0.8rem;">
                    <span>${opt}</span><span>${p.votes[i]}%</span>
                  </div>
                  <div class="poll-bar"><div class="poll-fill" style="width:${p.votes[i]}%;"></div></div>
                </div>
              `).join('')}
            </div>
          `).join('')}
        `;
      }

      function renderEducation() {
        return `
          <div class="section-header">📚 Крипто образование</div>
          ${data.education.map(e => `
            <div class="news-item" style="display:flex; justify-content:space-between;">
              <span style="color:white;">${e.title}</span>
              <span style="color:#f0b73e; font-size:0.7rem;">${e.level}</span>
            </div>
          `).join('')}
        `;
      }

      function renderLinks() {
        return `
          <div class="section-header">🔗 Полезные ссылки</div>
          <div class="news-item">📺 YouTube канал</div>
          <div class="news-item">💱 Рекомендованные биржи</div>
          <div class="news-item">📊 Трекер портфеля</div>
          <div class="news-item">🤝 Партнёрские ресурсы</div>
        `;
      }

      function renderPortfolio() {
        return `
          <div class="section-header">💼 Портфель создателя</div>
          <div class="glass-card" style="padding:16px;">
            <div style="color:white;">BTC 45% | ETH 30% | SOL 15% | Другое 10%</div>
            <div class="poll-bar" style="margin:12px 0;"><div class="poll-fill" style="width:72%;"></div></div>
            <div style="color:#a0b8d0;">+24.8% за всё время</div>
          </div>
        `;
      }

      function renderFAQ() {
        return `
          <div class="section-header">❓ FAQ</div>
          <div class="news-item">🔹 Что такое стейкинг?</div>
          <div class="news-item">🔹 Как вступить в Premium?</div>
          <div class="news-item">🔹 Безопасность активов</div>
        `;
      }

      function renderProfile() {
        return `
          <div class="welcome-banner" style="text-align:center;">
            <div style="font-size:3rem;">👤</div>
            <div style="color:white; font-weight:700;">Профиль</div>
            <div style="color:#b0c2d8;">Сохранено: ${state.bookmarks.size}</div>
            <div style="color:#f0b73e;">Premium статус активен</div>
          </div>
        `;
      }

      const renderers = {
        home: renderHome, videos: renderVideos, news: renderNews,
        community: renderCommunity, polls: renderPolls, education: renderEducation,
        links: renderLinks, portfolio: renderPortfolio, faq: renderFAQ, profile: renderProfile
      };

      function navigate(section) {
        state.section = section;
        document.getElementById('mainContent').innerHTML = renderers[section]?.() || '';
        document.querySelectorAll('.nav-icon').forEach(el => {
          el.classList.toggle('active', el.dataset.section === section);
        });
        if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
      }

      // Event listeners
      document.querySelectorAll('.nav-icon').forEach(icon => {
        icon.addEventListener('click', (e) => navigate(e.currentTarget.dataset.section));
      });

      document.getElementById('mainContent').addEventListener('click', (e) => {
        const navCard = e.target.closest('.nav-card');
        if (navCard?.dataset.nav) navigate(navCard.dataset.nav);
        if (e.target.classList.contains('watch-btn')) {
          tg?.showAlert('🎬 Видео открывается...');
        }
        if (e.target.closest('.poll-bar')) {
          tg?.showAlert('✅ Голос принят!');
        }
      });

      // Initial load & simulated push
      navigate('home');
      setTimeout(() => {
        const toast = document.createElement('div');
        toast.style.position='absolute'; toast.style.top='70px'; toast.style.left='20px'; toast.style.right='20px';
        toast.style.background='#f0b73e'; toast.style.color='#000'; toast.style.padding='12px';
        toast.style.borderRadius='18px'; toast.style.fontWeight='bold';
        toast.innerText='🔔 Новый эксклюзивный анализ!';
        document.getElementById('app').appendChild(toast);
        setTimeout(()=> toast.remove(), 3500);
      }, 2500);
    })();
  </script>
</body>
</html>
